# nginx.conf (PROD) — NOC Guardian
# - TLS 1.3/1.2 + HTTP/2 + HSTS
# - Reverse proxy: UI (ui:80) e API Central (central:8080)
# - Dashboard API (dashboard:8090)
# - Logs com upstream_status
# - Downloads: /downloads/

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Log detalhado
  log_format upstream
    '$remote_addr - $host "$request" $status $body_bytes_sent '
    'rt=$request_time urt=$upstream_response_time usta=$upstream_status '
    'uaddr=$upstream_addr ua="$http_user_agent" ref="$http_referer"';

  access_log /dev/stdout upstream;
  error_log  /dev/stderr warn;

  # Rate limits por IP
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=auth_forgot:10m rate=2r/s;

  # Websocket upgrade
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  client_max_body_size 10m;

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nocguardian.bitbyteti.tec.br;

    ssl_protocols TLSv1.3 TLSv1.2;

    ssl_certificate     /etc/letsencrypt/live/nocguardian.bitbyteti.tec.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nocguardian.bitbyteti.tec.br/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    set $ui_upstream       "ui:80";
    set $central_upstream  "central:8080";
    set $dash_upstream     "dashboard:8090";

    # Bloqueio de dotfiles/arquivos sensíveis
    location ~* (^/\.|/\.|\.env$|\.env\.|\.git|\.gitignore|\.DS_Store|\.ht) { return 403; }

    # Bloqueio básico de métodos estranhos (mantém GET/POST/HEAD/OPTIONS)
    if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) { return 405; }

    # ======================
    # DOWNLOADS (Agentes)
    # ======================
    location /downloads/ {
      alias /var/www/downloads/;
      autoindex off;
      try_files $uri =404;
      limit_except GET HEAD { deny all; }
      add_header Cache-Control "no-store" always;
    }

    # ======================
    # DASHBOARD API (sidecar)
    # ======================
    # Regex SEM {36} para evitar o parser do nginx interpretar chaves.
    # Casa com: /api/v1/tenants/<qualquer-coisa-sem-barra>/dashboard/
    location ~ "^/api/v1/tenants/[^/]+/dashboard/" {
      proxy_pass http://$dash_upstream;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_set_header X-Dashboard-Secret "ea31b19b1ea238f7cc99fedb6a1da55411f6afb6ceae1f70438c9a5c85732cf3";
    }

    # ======================
    # AUTH (rate limit mais agressivo)
    # ======================
    location = /api/v1/auth/login {
      limit_req zone=auth_zone burst=10 nodelay;
      proxy_pass http://$central_upstream;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/v1/auth/refresh {
      limit_req zone=auth_zone burst=20 nodelay;
      proxy_pass http://$central_upstream;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/v1/auth/forgot-password {
      limit_req zone=auth_forgot burst=5 nodelay;
      proxy_pass http://$central_upstream;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ======================
    # API geral
    # ======================
    location /api/ {
      proxy_pass http://$central_upstream;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # UI (container ui)
    location / {
      proxy_pass http://$ui_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # Health
    location /healthz {
      proxy_pass http://$central_upstream/healthz;
    }

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
  }

  # Redirect HTTP -> HTTPS
  server {
    listen 80;
    listen [::]:80;
    server_name nocguardian.bitbyteti.tec.br;
    return 301 https://$host$request_uri;
  }
}
