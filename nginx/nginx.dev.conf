# nginx.dev.conf (DEV: HTTP sem TLS) - Reverse proxy seguro
# - Proxy para UI (porta 5173) e Central (8080)
# - Bloqueia arquivos sensíveis (.env, .git, etc)
# - Adiciona headers básicos de segurança

events {}

http {
  # Melhores práticas de headers mínimos
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name nocguardian.bitbyteti.tec.br;

    # Bloqueia dotfiles e arquivos sensíveis em qualquer lugar
    location ~* (^/\.|/\.|\.env$|\.env\.|\.git|\.gitignore|\.DS_Store|\.ht) {
      return 403;
    }

    # UI (Vite/React em 5173)
    location / {
      proxy_pass http://ui:5173;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto http;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # API Central
    location /api/ {
      proxy_pass http://central:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto http;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Health
    location /healthz {
      proxy_pass http://central:8080/healthz;
    }

    # Pequenos headers de segurança
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
  }
}
