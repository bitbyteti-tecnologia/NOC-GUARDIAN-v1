# compose.central.yml (PROD)
# - db, central, ui(prod estática), nginx(TLS) + dashboard-api (sidecar)
# - Central NÃO expõe 8080 publicamente (somente via nginx)
# - Certs montados via /etc/letsencrypt inteiro
# - Rede externa: docker_nocnet

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      - POSTGRES_PASSWORD=guardian_strong_password
      - POSTGRES_USER=guardian
      - POSTGRES_DB=guardian_master
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian -d guardian_master"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped
    networks:
      - nocnet

  central:
    environment:
      - PGSSLMODE=disable
      - PGPASSWORD=guardian_strong_password
      - PGUSER=guardian
      - PGPORT=5432
      - PGHOST=db
    build:
      context: ../central
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nocnet

  ui:
    build:
      context: ../UI
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    networks:
      - nocnet

  dashboard:
    build:
      context: ../dashboard-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nocnet
    environment:
      - MASTER_DB_HOST=db
      - MASTER_DB_PORT=5432
      - MASTER_DB_USER=guardian
      - MASTER_DB_PASS=guardian_strong_password
      - MASTER_DB_NAME=guardian_master
      - DASH_LISTEN=:8090
      - DASHBOARD_SECRET=ea31b19b1ea238f7cc99fedb6a1da55411f6afb6ceae1f70438c9a5c85732cf3

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - /opt/noc-guardian/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/noc-guardian/downloads:/var/www/downloads:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - central
      - ui
      - dashboard
    restart: unless-stopped
    networks:
      - nocnet

volumes:
  dbdata:

networks:
  nocnet:
    external: true
    name: docker_nocnet
