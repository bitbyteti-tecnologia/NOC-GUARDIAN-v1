# nginx.ui.conf
# - Serve build estático do React (SPA)
# - try_files garante que rotas do React Router retornem index.html

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache para assets (opcional)
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
